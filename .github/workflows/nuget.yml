name: Publish NuGet to GitHub Packages (Org)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package Version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env: 
  ORG_NAME: "FundOffice"
  NUGET_SOURCE: "https://nuget.pkg.github.com/FundOffice/index.json"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          source-url: ${{ env.NUGET_SOURCE }}
        env:
          # 🔴 修改点 2: 使用专用 PAT 变量，兼容跨组织推送
          NUGET_AUTH_TOKEN: ${{ secrets.ORG_PAT }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Determine Version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            RAW_TAG="${{ github.event.release.tag_name }}"
            VERSION="${RAW_TAG#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Resolved Version: $VERSION"

      - name: Pack NuGet
        run: |
          dotnet pack --configuration Release --no-build --output ./nupkgs \
            /p:PackageVersion=${{ env.VERSION }} \
            /p:ContinuousIntegrationBuild=true

      - name: Push to GitHub Packages & Set Public
        shell: bash
        run: |
          # 1. 推送主包
          dotnet nuget push "./nupkgs/*.nupkg" \
            --source "${{ env.NUGET_SOURCE }}" \
            --api-key "${{ secrets.ORG_PAT }}" \
            --skip-duplicate

          # 推送符号包（如果存在）
          if ls ./nupkgs/*.snupkg 1> /dev/null 2>&1; then
            dotnet nuget push "./nupkgs/*.snupkg" \
              --source "${{ env.NUGET_SOURCE }}" \
              --api-key "${{ secrets.ORG_PAT }}" \
              --skip-duplicate
          fi

          # 2. 动态提取 Package ID（修复原命令的语法缺陷）
          FULL_FILE=$(ls ./nupkgs/*.nupkg 2>/dev/null | head -n 1)
          PACKAGE_ID=$(basename "$FULL_FILE" .nupkg)
          # 利用前面已生成的 ${{ env.VERSION }} 剥离版本号，得到纯净包名
          PACKAGE_ID=${PACKAGE_ID%.${{ env.VERSION }}}
          echo "📦 提取到的 Package ID: $PACKAGE_ID"

          # 3. 调用 GitHub API 改为 Public
          # ⚠️ 首次发布后 GitHub 需要 ~10 秒注册包元数据，加个 sleep 更稳定
          sleep 5
          
          curl -s -f -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.ORG_PAT }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/orgs/${{ env.ORG_NAME }}/packages/nuget/${PACKAGE_ID}" \
            -d '{"visibility": "public"}' || echo "⚠️ API 调用失败，请手动在网页设置 Public"

          echo "✅ 已完成推送与可见性设置"
